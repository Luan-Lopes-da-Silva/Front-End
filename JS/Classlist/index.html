<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classlist</title>
</head>
<style>
.blue{
color: blue;    
}
.red{
color: red;    
}
</style>
<body>
    <p id="text" class="texto">Aqui temos um texto</p>

    
</body>

<script>
 let texto = window.document.getElementById('text');  
 texto.classList.add('red')

 if(texto.classList.contains('red')){
 alert('Elemento contem classe vermelha')    
 }
</script>
</html>
